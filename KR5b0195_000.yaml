front:
  text: 玉籙資度設醮儀
  hash: sha256:081bdb9bd6935a67871198ea569edcb99ff382b767b9f1f1d17ed4736c52e77b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0195_HFL_000-001a, image: hfl/0268/0268-034.png}
body:
  text: 法事如式各禮師存念如法請宣神呪五靈列位煥明五方始皇護魂丹老衛形皓靈侍魄黑帝攝生中央黃帝統御萬真元皇告下幽夜開光罪消北府名列南昌金籙定籍玉字除殃朱陵鍊質飛神太倉三官九府無極神鄉普受開度上生天堂和與道合真鳴法鼓二十四通無上三天玄元始三氣太上道君太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神真臣今設醮朝修謹奏為入意其諸齋悃具載青詞願得太上至真道氣靈寶慧光下降流入臣等身中令臣所啓之誠速逹徑御至真無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前請稱法位具位臣姓某與臨壇官衆等謹同誠上啓太上無極大道虛無自然元始天尊太上道君太上老君昊天玉皇上帝紫微天皇大帝紫微北極大帝后土皇地祇東極慈尊運明保元上帝十方應化救苦天尊九天生神上帝三十二天上帝五靈五老上帝上清十一曜星君二十八宿星君三元三官大帝北極四聖真君北極九府上真道君泰玄樞機三省上相真君靈寶五師真君九天諸司真宰天曹諸司真君大慈大悲救苦真人大慈大悲大惠真人妙行真人法解真人太乙玄生府青玄黃籙院主宰仙官黃籙九司仙靈九天普度仙真靈官三元三官九府真宰五嶽五帝真君祖玄真師真人五天聖帝本派經籍度師真人北隂玄天酆都大帝六洞十宫九幽冥路主執神靈京都城隍諸廟聖衆三界應感一切真靈臣聞赤明開圖祖氣散洪濛之粹青華御極神光敷混沌之精握蒼蓋而稟清微臨黃輿而蘇北鬱靈風鼓舞威神遍滿於十方甘露涵濡慧力圎通於三界凝紫金之瑞相宴碧玉之祥區二府雲聮九司星列尋聲赴感慈悲演妙於香林應化分身道德凝玄於騫樹天人皈命幽顯傾心臣等一念疏瀹五體澄虛行道修齋巳拜鴻厖之惠瞻天望聖爰殫螻蟻之誠莫結草以攄誠姑采蘋而致薦伏願龍旗翠節翊霄景於玄虛鳳葆珠幢擁靈輝於碧落清蹕肅獅頭之駕黃麾嚴豹尾之塵十華之日駟來臨風雲合景三極之霞驂迂涖水月交輝不忘應感之私悉副懇祈之切臣等不勝曕天望聖激切之至與醮列真先當奉請降兩班與醮列真三界衆真醮筵列聖向伸拜請諒沐光臨請各整於仙班共祗迎於帝御降九御鸞輿至止鶴駕臨軒與醮列真如儀朝禮朝禮既周請升醮座禮官上香酒陳初獻舉散花重稱法位具位臣姓某與臨壇官衆等謹同誠上啓三清上聖東極慈尊三界真仙無鞅聖衆臣聞雲層列聖青林凝生氣之華風澤億曹黑壘結迷雲之翳羅六天之幽府列九地之神鄉職宰隂陽權司水火匪廓慶雲之汗漫孰開昏霧之冥濛俾宴玉芝永超金粟企神功於浩劫仰願力於中天虎拜勤渠鳯瞻激切臣等欽奉綸音崇修玉籙資薦某靈益增天福克證道真匪請命於妙嚴曷升神於霄極肅芝壇而肆覲依蓮座以對揚潔己首愆精心徼福果拜登真之惠特敷證品之功知恩報恩當罄情於瑶上德不德固何意於珠環葑菲自慚蘋蘩冒列爰有青詞謹當宣奏宣詞詞旨具陳淵衷洞鑒伏願聽卑不遺流丹恩於惠露臨下有赫逭玄憲於風霆混萬聖以時歆羅千真而日鑒蒙如蟻禱亶謝洪私臣等不勝酒陳亞獻宣進狀臣謹重誠上啓三清上聖東極慈尊三界真仙無鞅聖衆臣聞渺渺大羅凝九華之妙氣塵塵剎土現三際之法身慈雲東闡於玄真聖日上宗於元始玉毫逺照廓華蓋而六合彌綸金景旋飛下昆崘而九幽昭朗枝灑空青之蘂瓶流沈碧之英妙矣玄機大哉至化凡皈依而有請悉提奬以無遺用資某靈伏願五神氷瑩萬氣波澄心易悟未畫之前性頓覺無名之始驪珠猶耀映滄海以涵虛蟾玉孤明現碧霄而煥景高步緑霞之景棲身紫極之庭翠篆承顔侍赤圎於長樂金芝綴武凝青藹於方諸上願覆載清寧儀璘煥耀山靈薦祉川后呈祥熙熙藏富於三農桑麻雨足蕩蕩收烽於四鄙榆柳春間無焚林竭澤之憂遂戾天躍淵之樂三途五苦均鼓舞於福鄉四海九州悉歡呼於壽域皇圖永固宗社隆安臣等致恭酒陳三獻法事臣謹重誠上啓三清上聖東極慈尊三界真仙無鞅聖衆臣聞旋天色凝天淵函圎方而朗照親有德享有道廓經緯以周流俯殫翼翼之小心仰扣巍巍之大造光明濟下冀旌几奏之勤恍忽質旁諒恕階升之瀆以今敷陳禮畢薦獻情周蘭煙收鳯鼎之華蓮炬暗龍缸之燼前瞻翠節將返景於璇霄後矚珠幡巳回光於瑶極月駟逶迤而旁邁雲龍搖曵以高征萬聖旋班千真復位運元會道百神混合於泥九入妙凝真萬氣虛圎於玄化臣等下情無任不勝攀戀之至謹稽首頓首奉辭聖駕回軿頌存神燒香香官使者左右龍虎君侍香諸靈官當令臣設醮朝修之所自然生金液丹碧芝英百靈衆真交會在此香火爐前當願醮修圎滿景福旁敷十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹徑御至真無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前寶華圎滿天尊送聖化財向來回向玉籙資度設醮儀
